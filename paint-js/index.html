<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Paint</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css" integrity="sha512-SfTiTlX6kk+qitfevl/7LibUOeJWlt9rbyDn92a1DqWOw9vWG2MFoays0sgObmWazO5BQPiFucnnEAjpAB+/Sw==" crossorigin="anonymous" referrerpolicy="no-referrer" />
</head>
<body>
    <canvas id="jsCanvas" class="canvas"></canvas>
    <div class="controls">
        <div class="controls_colors" id="jsColors">
            <div class="control_color jsColor" style="background-color: #2c2c2c"></div>
            <div class="control_color jsColor" style="background-color: #ffffff"></div>
            <div class="control_color jsColor" style="background-color: #ff3b30"></div>
            <div class="control_color jsColor" style="background-color: #ff9500"></div>
            <div class="control_color jsColor" style="background-color: #ffcc00"></div>
            <div class="control_color jsColor" style="background-color: #4cd963"></div>
            <div class="control_color jsColor" style="background-color: #5ac8fa"></div>
            <div class="control_color jsColor" style="background-color: #0579ff"></div>
            <div class="control_color jsColor" style="background-color: #5856d6"></div>
        </div>

        <div class="controls_range">
            <i class="fa fa-paint-brush"></i>
            <input type="range" id="jsRange" min="0.1" max="15" value="2.5" step="0.1" autocomplete="off">
        </div>

        <div class="controls_btns">
            <button id="jsMode">Fill</button>
            <button id="jsSave">Save</button>
        </div>

        <div class="restart" id="ref">
            <i class="fa fa-refresh" aria-hidden="true"></i>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
